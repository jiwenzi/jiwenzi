<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#headerGrad)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <g opacity="0.15">
    <circle cx="100" cy="100" r="80" fill="white"/>
    <circle cx="1100" cy="300" r="120" fill="white"/>
    <circle cx="600" cy="350" r="60" fill="white"/>
  </g>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="white" opacity="0.9">Timeline</text>
</svg>
